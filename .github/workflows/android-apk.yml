name: Android APK

on:
  push:
    branches:
      - "claude/**"
    paths:
      - "dailydev-widget/**"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dailydev-widget
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dailydev-widget-debug-apk
          path: dailydev-widget/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
